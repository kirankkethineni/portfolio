<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Kiran K. Kethineni</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Patrick+Hand&display=swap"
        rel="stylesheet">
    <style>
        /* Page Specific Styles */
        .blog-wrapper {
            display: flex;
            height: calc(100vh - 450px);
            min-height: 500px;
            /* Adjust based on header/footer */
            overflow: hidden;
            position: relative;
            margin-top: 2rem;
            border: 2px solid var(--black);
            background: var(--white);
        }

        /* Left Control Panel */
        .controls-panel {
            width: 300px;
            background: var(--white);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            overflow: visible;
            /* CRITICAL: Must be visible for arrows */
            z-index: 20;
            /* Ensure on top */
        }

        /* The Rotary Knob Container */
        .knob-wrapper {
            position: relative;
            width: 250px;
            height: 500px;
            /* Tall enough for the half-circle */
            display: flex;
            align-items: center;
            left: -50px;
            /* Pull left */
        }

        /* The Rotating Element */
        /* The Rotary Knob (Half Circle on Left Edge) */
        /* The Rotary Knob (Half Circle on Left Edge) */
        .rotary-knob {
            width: 400px;
            height: 400px;
            background:
                /* Inner smooth surface (Masks the center) */
                radial-gradient(circle at 50% 50%, var(--gray-900) 0%, var(--gray-900) 55%, transparent 56%),
                /* Subtle metallic ridge pattern (Visible on edges) */
                repeating-conic-gradient(from 0deg,
                    var(--gray-800) 0deg 2deg,
                    var(--black) 2deg 4deg);
            border-radius: 50%;
            position: absolute;
            left: -200px;
            transition: transform 0.8s cubic-bezier(0.1, 0, 0.3, 1);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            color: var(--white);
            /* 3D Hardware Shadow */
            box-shadow:
                inset -5px 0 10px rgba(255, 255, 255, 0.1),
                inset 5px 0 10px rgba(0, 0, 0, 0.5),
                10px 0 30px rgba(0, 0, 0, 0.4);
            border: 4px solid var(--gray-800);
        }

        /* Central Cap (Optional aesthetic detail, kept for depth) */
        .rotary-knob::before {
            content: '';
            position: absolute;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle at 30% 30%, var(--gray-800), var(--black));
            border-radius: 50%;
            box-shadow:
                inset 2px 2px 5px rgba(255, 255, 255, 0.1),
                0 0 10px rgba(0, 0, 0, 0.8);
            z-index: 2;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        /* Static Arrows Layer */
        .knob-controls {
            position: absolute;
            left: 60px;
            /* Moved inside for better visibility */
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 120px;
            /* More space */
            z-index: 10;
            pointer-events: none;
        }

        .control-arrow {
            width: 100px;
            /* Much larger */
            height: 100px;
            color: var(--white);
            /* Clearly visible */
            cursor: pointer;
            pointer-events: auto;
            transition: transform 0.2s, opacity 0.2s, color 0.2s;
            filter: drop-shadow(0px 2px 4px rgba(0, 0, 0, 0.8));
            /* Strong shadow for contrast */
        }

        .control-arrow:hover {
            color: rgba(255, 255, 255, 0.9);
        }

        /* Align with curve and maintain on hover */
        .arrow-up {
            transform: rotate(-15deg);
        }

        .arrow-up:hover {
            transform: rotate(-15deg) scale(1.1);
        }

        .arrow-down {
            transform: rotate(15deg);
        }

        .arrow-down:hover {
            transform: rotate(15deg) scale(1.1);
        }

        /* Right Content Area */
        .blog-carousel {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
            background-color: var(--white);
            padding: 2rem;
            overflow: hidden;
        }

        .blog-card {
            width: 90%;
            /* Wider for landscape */
            max-width: 800px;
            height: 70%;
            /* Taller to fit content */
            background: var(--white);
            border: 2px solid var(--black);
            padding: 3rem;
            position: absolute;
            transition: all 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
            opacity: 0;
            transform: translateX(100px) rotateY(-10deg);
            display: flex;
            flex-direction: column;
            box-shadow: 15px 15px 0px rgba(0, 0, 0, 0.1);
            overflow-y: auto;
            /* Allow scrolling for long content */
        }

        /* ... existing active/prev/next/typography ... */
        .blog-card.active {
            opacity: 1;
            transform: translateX(0) rotateY(0);
            z-index: 10;
        }

        .blog-card.prev {
            opacity: 0;
            transform: translateY(-100%) rotate(-10deg);
            z-index: 5;
        }

        .blog-card.next {
            opacity: 0;
            transform: translateY(100%) rotate(10deg);
            z-index: 5;
        }

        .blog-date {
            font-family: 'Patrick Hand', cursive;
            color: var(--gray-500);
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .blog-title {
            font-family: 'Patrick Hand', cursive;
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            line-height: 1.1;
        }

        .blog-excerpt {
            font-family: 'Inter', sans-serif;
            font-size: 1.2rem;
            line-height: 1.6;
            color: var(--gray-700);
            margin-bottom: 2rem;
            flex-shrink: 0;
        }

        .blog-body {
            font-family: 'Inter', sans-serif;
            font-size: 1.1rem;
            line-height: 1.6;
            color: var(--gray-800);
            margin-bottom: 2rem;
            white-space: pre-wrap;
            /* Preserve newlines */
        }

        /* Mobile responsive */
        @media(max-width: 768px) {
            .blog-wrapper {
                flex-direction: column;
                height: auto;
                min-height: 90vh;
            }

            .controls-panel {
                width: 100%;
                height: 150px;
                border-bottom: none;
                justify-content: center;
                overflow: hidden;
            }

            .knob-wrapper {
                width: 100%;
                height: 100%;
                left: 0;
                justify-content: center;
                align-items: flex-end;
                /* Knob at bottom */
            }

            .rotary-knob {
                width: 300px;
                height: 300px;
                left: auto;
                bottom: -150px;
                /* Peak out top half */
                position: relative;
            }

            .knob-controls {
                flex-direction: row;
                gap: 150px;
                top: 20px;
                left: 50%;
                transform: translateX(-50%);
            }
        }
    </style>
</head>

                            <svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="4"
                                stroke-linecap="round" stroke-linejoin="round">
                                <!-- Large arc mimicking the knob rim (Bulge Right) -->

    </main>

    <script>
        // Sample Blog Data
        const BLOG_POSTS = [
            {
                id: 25,
                date: 'Jan 27, 2026',

                excerpt: 'AI won’t just live in apps and chatbots. It will quietly shape physical products, personalization, and daily life in ways we barely notice...',
                body: `The most transformative technologies often become invisible. AI is heading in that direction — embedded into everyday objects and services.\n\nPersonalized products, adaptive environments, and on-demand manufacturing become more practical when AI handles design, optimization, and decision-making behind the scenes.\n\nThere may be cultural hesitation, but the economic pull is strong. When personalization becomes cheaper than mass production, AI stops being a feature and becomes infrastructure.`
            },
            {
                id: 24,
                date: 'Jan 27, 2026',
                title: 'AI Will Redefine How Stories Are Made',
                excerpt: 'From virtual actors to low-cost visual effects, AI is lowering the barrier to cinematic storytelling — and changing who gets to create...',
                body: `High-end storytelling used to require large teams, expensive actors, and complex visual effects pipelines. AI is starting to compress that stack.\n\nRealistic avatars, synthetic voices, procedural environments, and AI-assisted VFX make it possible to produce scenes that once required major studio budgets.\n\nThis doesn’t remove human creativity — it shifts the bottleneck. The future of entertainment may be less about access to resources and more about imagination and direction.`
            },
            {
                id: 23,
                date: 'Jan 27, 2026',
                title: 'The AI Era Is Also the Zero-Trust Era',
                excerpt: 'As AI gets better at generating content, trust becomes the real scarcity. Verification, not creation, may define the next wave of technology...',
                body: `AI lowers the cost of creating text, images, audio, and code. That’s powerful — and dangerous. Misinformation, deepfakes, and automated attacks become easier to scale.\n\nAt the same time, AI is also used to detect synthetic content. But that arms race reveals something deeper: we’re moving into a world where seeing is no longer believing.\n\nThe AI era may also be the zero-trust era, where authentication, provenance, and verification systems matter as much as the models themselves.`
            },
            {
                id: 22,
                date: 'Jan 27, 2026',
                title: 'The Release That Changed the AI Race',
                excerpt: 'Breakthroughs in AI often sit in research labs for years. Sometimes it’s not the invention, but the release, that reshapes the industry...',
                body: `Major AI advances often come from long research pipelines. But industry shifts happen when technology moves from papers into public hands.\n\nReleasing powerful generative models changed expectations overnight — not just among researchers, but businesses, creators, and investors. That moment accelerated adoption across the entire field.\n\nInnovation doesn’t only belong to those who invent first. It also belongs to those who recognize when a technology is ready to reshape the world — and act on it.`
            },
            {
                id: 21,
                date: 'Jan 27, 2026',
                title: 'AI Is This Generation’s Internet Moment',
                excerpt: 'Like the internet and GUIs before it, AI isn’t just a tool — it’s an interface shift. The winners will be the ones who learn to ride it early...',
                body: `Some technologies don’t just improve workflows — they change the playing field. The internet was one. Graphical interfaces were another. AI is joining that list.\n\nCompanies that treat AI as a side feature will lag behind those that redesign their workflows around it. History shows this pattern clearly: early adopters of paradigm shifts don’t just survive — they lead.\n\nA human can’t outrun a horse. But a human riding a horse changes the race entirely. AI is that multiplier.`
            },
            {
                id: 20,
                date: 'Jan 27, 2026',
                title: 'Sometimes Addition Beats Convolution',
                excerpt: 'We often use complex operations to combine features, but in some cases simple addition can force cleaner, more structured representations...',
                body: `Feature combination in neural networks is often done through learned convolutions or dense layers. But there’s an interesting idea in constraining models to add features instead.\n\nWhen addition is enforced, the network has to learn representations that combine meaningfully in a shared space. Training then acts like an implicit feature alignment process.\n\nComplex operations give flexibility. Simple ones can encourage structure. Sometimes limiting how features interact leads to more interpretable and efficient learning.`
            },
            {
                id: 19,
                date: 'Jan 27, 2026',
                title: 'Graph ML: Adding Context to Data Points',
                excerpt: 'Traditional ML treats samples independently. Graph learning changes that by letting data points talk to their neighbors before making predictions...',
                body: `Most machine learning models assume data points are independent. But in many real systems — social networks, molecules, traffic maps — everything is connected.\n\nGraph Neural Networks handle this by passing messages between neighboring nodes. Each node gathers context from its surroundings, building a richer representation before prediction.\n\nAfter this exchange, nodes can be treated like informed individuals rather than isolated points. Graph ML doesn’t replace traditional ML — it adds context before applying it.`
            },
            {
                id: 18,
                date: 'Jan 27, 2026',
                title: 'Transformers Are a Milestone, Not the Destination',
                excerpt: 'Transformers solved long-range dependencies with efficient representation, but not every problem looks like language. New paradigms are still ahead...',
                body: `Transformers were a breakthrough because they handled long-range dependencies while compressing information efficiently. That made them perfect for language and sequence modeling.\n\nBut not all intelligence is sequence prediction. Real-time control, embodied reasoning, and continuous interaction with the world demand different constraints and representations.\n\nLLMs are a major stop on the journey. But they’re a rest area, not the final city. New architectures will be needed for systems that live outside text.`
            },
            {
                id: 17,
                date: 'Jan 27, 2026',
                title: 'AI Hasn’t Even Left the Shore Yet',
                excerpt: 'The industry is obsessed with LLMs, but they’re just one slice of intelligence. Perception and action in the real world remain largely unsolved...',
                body: `Right now, AI feels synonymous with large language models. But language is only one dimension of intelligence — and not even the hardest one.\n\nPerception, physical interaction, adaptability in dynamic environments — these are far more complex challenges. Getting a robot to reliably act in the real world is still an open frontier.\n\nWe’re celebrating systems that talk well. The real revolution comes when systems can see, decide, and act with the same flexibility.`
            },
            {
                id: 16,
                date: 'Jan 27, 2026',
                title: 'SVMs and the Power of Changing Dimensions',
                excerpt: 'When data isn’t separable in one space, SVMs teach us a powerful lesson: change the space. Sometimes the solution isn’t harder math — it’s a better perspective...',
                body: `Support Vector Machines are a beautiful example of thinking beyond the obvious. If data can’t be separated by a line in its current dimension, SVMs quietly ask: what if we look at it somewhere else?\n\nBy mapping data into a higher-dimensional space, patterns that looked tangled can suddenly become cleanly separable. The problem didn’t change — the representation did.\n\nIt’s a reminder that in ML (and life), when a solution seems impossible, the answer may be to change the space of the problem, not just push harder in the same one.`
            },
            {
                id: 15,
                date: 'Jan 27, 2026',
                title: 'Intelligence Begins Where Supervision Ends',
                excerpt: 'Supervised learning is powerful, but it’s mostly compression of labeled examples. True intelligence looks closer to exploration, feedback, and adaptation...',
                body: `Supervised learning is incredibly effective — but in many ways, it’s structured memorization. The model learns to map inputs to labels within the boundaries we define.\n\nReinforcement and self-supervised paradigms feel closer to how natural intelligence develops. An agent explores, makes mistakes, updates its behavior, and sometimes even unlearns outdated strategies.\n\nThat loop — act, observe, adapt — builds systems that can handle novelty. Intelligence isn’t just fitting data. It’s developing the ability to use past experience to navigate situations never seen before.`
            },
            {
                id: 14,
                date: 'Jan 27, 2026',
                title: 'Meta-Learning Is Learning How Change Changes',
                excerpt: 'If gradients tell us how to update parameters, meta-learning looks one level higher — how those updates themselves should change...',
                body: `Standard learning asks: How should parameters change to reduce error?\n\nMeta-learning asks a deeper question: How should the learning process itself change? In calculus terms, it’s about how updates evolve over time — learning the structure of learning.\n\nThis higher-level view gives models a more global sense of the error landscape. Instead of taking only small, local steps, they can make smarter, more directed moves and adapt faster to new tasks.\n\nIt’s optimization, but one level up the ladder.`
            },
            {
                id: 13,
                date: 'Jan 27, 2026',
                title: 'Differential Calculus Is the Oxygen of ML',
                excerpt: 'Strip away the buzzwords and AI runs on one core tool: differential calculus. Gradients are what let machines know how to improve...',
                body: `At the core of almost every modern ML system is differential calculus.\n\nWhen a model makes a mistake, calculus tells it how the error changes with respect to each parameter. That rate of change — the gradient — is the signal that guides learning. Without it, we’d have no efficient way to adjust millions or billions of weights.\n\nData is the fuel. Compute is the engine. But calculus is the oxygen. Without gradients, modern AI simply doesn’t breathe.`
            },
            {
                id: 12,
                date: 'Jan 27, 2026',
                title: 'Your Loss Function Is Your Real Architecture',
                excerpt: 'We obsess over model design, but the loss function often shapes behavior more than the architecture itself. What you choose to optimize defines what the model becomes...',
                body: `When training models, we often focus on layers, parameters, and structure. But the loss function is just as powerful — sometimes more.\n\nHumans tend to improve systems by “adding more” — more features, more data, more complexity. But optimization doesn’t think like that. It will reduce error however it can, even if that means exploiting shortcuts we didn’t intend.\n\nDesigning a good loss function is like defining the rules of the game. If the objective is wrong, the model will become very good at solving the wrong problem.`
            },
            {
                id: 11,
                date: 'Jan 27, 2026',
                title: 'Backpropagation Minimizes Error — Not Understanding',
                excerpt: 'Training doesn’t aim for “understanding.” It aims to reduce a loss function. If the data is skewed, the model will optimize for that skew...',
                body: `Backpropagation doesn’t care about meaning, fairness, or generalization. Its job is simple: reduce the loss function.\n\nIf your dataset is imbalanced, noisy, or biased, the optimization will happily exploit those patterns to reduce error. A lower loss doesn’t guarantee broader understanding — just better performance on what it sees.\n\nGeneralization comes from data quality, regularization, and problem formulation. Optimization alone only chases the metric you define.`
            },
            {
                id: 10,
                date: 'Jan 27, 2026',
                title: 'Linear Regression Is the Gateway to Deep Learning',
                excerpt: 'If you truly understand linear regression, you already understand the foundation of neural networks. Deep learning is just that idea stacked and scaled...',
                body: `At its heart, linear regression is a weighted sum of inputs. That’s exactly what a single neuron does.\n\nNow stack many of those neurons into layers, add nonlinearities, and suddenly you have a neural network. Go deeper, add more units, and you get deep learning.\n\nThe math gets heavier, but the core idea doesn’t change. Deep networks aren’t magic — they’re linear models composed and layered at massive scale.`
            },
            {
                id: 9,
                date: 'Jan 27, 2026',
                title: 'Why Traditional ML Hits a Ceiling',
                excerpt: 'Classic ML works well for narrow patterns, but human-like performance needs context, semantics, and an understanding of the scene — not just features...',
                body: `Traditional machine learning is great at pattern recognition within a defined feature space. But the real world isn’t just patterns — it’s context.\n\nHumans don’t just see pixels; we see objects, relationships, intent, and environment. To approach that level, AI systems need semantic and spatial understanding, not just statistical correlations.\n\nWithout context, models stay narrow. With scene-level reasoning, they start behaving more like systems that actually understand their environment.`
            },
            {
                id: 8,
                date: 'Jan 27, 2026',
                title: 'Scaling Isn’t the Same as Learning',
                excerpt: 'Bigger models aren’t always smarter models. True learning efficiency comes from architectures that compress knowledge effectively, not just store more of it...',
                body: `Throwing more parameters at a problem can improve performance — but it’s not the same as learning efficiently.\n\nA model is essentially a compression system. It encodes patterns from data into weights. Good architectures compress the right structure with fewer parameters. Bad ones just memorize more.\n\nProgress isn’t just about scale. It’s about how well an architecture turns experience into compact, reusable knowledge.`
            },
            {
                id: 7,
                date: 'Jan 27, 2026',
                title: 'Physical AI Is the Quiet Revolution',
                excerpt: 'While the world focuses on chatbots and image models, the real long-term shift may come from AI that can act in the physical world...',
                body: `Most of today’s AI lives in screens — text, images, simulations. But intelligence becomes far more powerful when it can act.\n\nPhysical AI — systems that connect perception, decision-making, and real-world action — brings new challenges: physics, uncertainty, feedback loops, and safety. It’s slower to develop, but far more transformative.\n\nThe companies investing early in simulation, robotics, and embodied learning may end up shaping the next major wave — when AI doesn’t just describe the world, but interacts with it.`
            },
            {
                id: 6,
                date: 'Jan 27, 2026',
                title: 'Simple Models Run the World',
                excerpt: 'We celebrate deep learning, but most real-world decisions still run on regression and tree-based models — and that’s not a weakness...',
                body: `A lot of everyday AI in production isn’t transformers or deep nets. It’s linear regression, logistic regression, and random forests quietly making decisions.\n\nCredit scoring, demand forecasting, risk models, anomaly detection — these problems often have structured data and clear signals. Simple models are faster, easier to debug, and more stable over time.\n\nState-of-the-art matters at the frontier. But for daily business decisions, boring models win more often than we admit.`
            },
            {
                id: 5,
                date: 'Jan 27, 2026',
                title: 'We Stopped Studying How We Think',
                excerpt: 'Early AI progress came from carefully breaking down how humans solve problems. Today, we often skip that step and rely on brute-force scale instead...',
                body: `Some of the biggest early breakthroughs in AI came from people deeply analyzing how humans solve specific tasks and turning that into algorithms.\n\nThat mindset has faded. Instead of modeling reasoning steps, we often throw more data and parameters at the problem and hope scale figures it out.\n\nBrute force works — but it’s expensive and opaque. There’s still huge untapped value in articulating how a task is solved and embedding that structure into learning systems.`
            },
            {
                id: 4,
                date: 'Jan 27, 2026',
                title: 'AI Isn’t Magic — It’s Fast Math',
                excerpt: 'AI feels magical, but under the hood it’s just numerical computation happening at enormous speed. The “intelligence” comes from scale, not mysticism...',
                body: `There’s a tendency to treat AI like a mysterious entity. In reality, it’s layers of floating-point operations running at extreme speed.\n\nNeural networks don’t “understand” in a human sense — they compute weighted sums, apply nonlinearities, and propagate signals forward and backward. What feels like reasoning is the emergent result of massive numerical optimization.\n\nThe magic isn’t supernatural. It’s silicon doing math billions of times per second. Speed plus scale creates the illusion of something deeper.`
            },
            {
                id: 3,
                date: 'Jan 27, 2026',
                title: 'Why AI Can Learn (Almost) Anything',
                excerpt: 'Human learning and machine learning aren’t that different at the core. Both adjust internal representations based on feedback — the difference is scale and speed...',
                body: `At a high level, learning is simple: try something, see the result, adjust.\n\nHumans do this with neurons and experience. AI does it with parameters and gradients. The mechanism — updating internal representations based on error — is surprisingly aligned.\n\nThe difference isn’t that AI has a magical ability. It’s that machines can repeat this adjustment process millions of times, across massive datasets, at a speed biology can’t match. Scale turns a simple learning rule into seemingly complex intelligence.`
            },
            {
                id: 2,
                date: 'Jan 27, 2026',
                title: 'Blockchain vs RDBMS: Use the Right Tool',
                excerpt: 'Blockchain is secure and immutable — but that doesn’t mean it should replace traditional databases. Most systems still need structure, speed, and control...',
                body: `Blockchain solves a very specific problem: trust in a trustless environment. It gives you immutability, decentralization, and verifiable history.\n\nBut most applications don’t suffer from “unknown malicious actors rewriting history.” They suffer from slow queries, messy schemas, and poor indexing — problems relational databases handle beautifully.\n\nRDBMS systems are optimized for structured data, complex queries, and performance. Blockchain is a ledger. A database is an information system. They overlap, but they are not interchangeable. The future isn’t “blockchain everywhere” — it’s blockchain where trust is the bottleneck.`
            },
            {
                id: 1,
                date: 'Jan 27, 2026',
                title: 'Backpropagation Is the Real Breakthrough',
                excerpt: 'We talk about models, data, and scale — but the quiet hero of modern AI is backpropagation. Without it, none of this learning would exist...',
                body: `Strip away the hype, GPUs, and billion-parameter models, and modern AI stands on one core idea: backpropagation.\n\nBackprop is what turns a neural network from a static function into a learning system. It gives the model a way to measure how wrong it is and adjust itself layer by layer. That feedback loop is the difference between “a bunch of math” and “a system that improves with experience.”\n\nBigger models get attention. Smarter optimizers get papers. But backprop is the engine that made learning from data actually practical at scale.`
            }

        ];

        let currentIndex = 0;
        let currentRotation = 0;
        const knob = document.getElementById('knob');
        const container = document.getElementById('carousel-container');

        // Init
        function init() {
            renderCards();
            updateState();
        }

        function renderCards() {
            container.innerHTML = '';
            BLOG_POSTS.forEach((post, index) => {
                const card = document.createElement('div');
                card.className = `blog-card ${index === currentIndex ? 'active' : ''}`;
                card.id = `card-${index}`;

                card.innerHTML = `
                    <div class="blog-date">${post.date}</div>
                    <div class="blog-title">${post.title}</div>
                    <div class="blog-excerpt">${post.excerpt}</div>
                    <div class="blog-body">${post.body ? post.body.replace(/\n\n/g, '<br><br>') : ''}</div>
                `;

                container.appendChild(card);
            });
        }

        function rotateKnob(direction) {
            // Direction: 1 (down/next), -1 (up/prev)

            // Check bounds
            if (direction === 1 && currentIndex >= BLOG_POSTS.length - 1) return; // End of list
            if (direction === -1 && currentIndex <= 0) return; // Start of list

            currentIndex += direction;
            currentRotation += (direction * 45); // Rotate 45 deg per step

            updateState();
        }

        function updateState() {
            // Rotate Knob
            knob.style.transform = `rotate(${currentRotation}deg)`;

            // Update Cards
            const cards = document.querySelectorAll('.blog-card');
            cards.forEach((card, index) => {
                card.className = 'blog-card'; // Reset
                if (index === currentIndex) {
                    card.classList.add('active');
                } else if (index < currentIndex) {
                    card.classList.add('prev'); // Gone up
                } else {
                    card.classList.add('next'); // Waiting down
                }
            });

            // Update Arrows Visual State (Disable if at ends)
            document.querySelector('.arrow-up').style.opacity = currentIndex === 0 ? '0.3' : '1';
            document.querySelector('.arrow-up').style.pointerEvents = currentIndex === 0 ? 'none' : 'auto';

            document.querySelector('.arrow-down').style.opacity = currentIndex === BLOG_POSTS.length - 1 ? '0.3' : '1';
            document.querySelector('.arrow-down').style.pointerEvents = currentIndex === BLOG_POSTS.length - 1 ? 'none' : 'auto';
        }

        window.onload = init;

    </script>
</body>

</html>
