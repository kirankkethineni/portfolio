<head>

    <style>
        /* Page Specific Styles */
        .blog-wrapper {
            display: flex;
            height: calc(100vh - 220px);
            min-height: 500px;
            /* Adjust based on header/footer */
            overflow: hidden;
            position: relative;
            margin-top: 1rem;
            margin-bottom: 2rem;
            border: 2px solid var(--black);
            background: var(--white);
        }

        /* Left Control Panel */
        .controls-panel {
            width: 300px;
            background: var(--white);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            overflow: visible;
            /* CRITICAL: Must be visible for arrows */
            z-index: 20;
            /* Ensure on top */
        }

        /* The Rotary Knob Container */
        .knob-wrapper {
            position: relative;
            width: 250px;
            height: 500px;
            /* Tall enough for the half-circle */
            display: flex;
            align-items: center;
            left: -50px;
            /* Pull left */
        }

        /* The Rotating Element */
        /* The Rotary Knob (Half Circle on Left Edge) */
        /* The Rotary Knob (Half Circle on Left Edge) */
        .rotary-knob {
            width: 400px;
            height: 400px;
            background:
                /* Inner smooth surface (Masks the center) */
                radial-gradient(circle at 50% 50%, var(--gray-900) 0%, var(--gray-900) 55%, transparent 56%),
                /* Subtle metallic ridge pattern (Visible on edges) */
                repeating-conic-gradient(from 0deg,
                    var(--gray-800) 0deg 2deg,
                    var(--black) 2deg 4deg);
            border-radius: 50%;
            position: absolute;
            left: -200px;
            transition: transform 0.8s cubic-bezier(0.1, 0, 0.3, 1);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            color: var(--white);
            /* 3D Hardware Shadow */
            box-shadow:
                inset -5px 0 10px rgba(255, 255, 255, 0.1),
                inset 5px 0 10px rgba(0, 0, 0, 0.5),
                10px 0 30px rgba(0, 0, 0, 0.4);
            border: 4px solid var(--gray-800);
        }

        /* Central Cap (Optional aesthetic detail, kept for depth) */
        .rotary-knob::before {
            content: '';
            position: absolute;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle at 30% 30%, var(--gray-800), var(--black));
            border-radius: 50%;
            box-shadow:
                inset 2px 2px 5px rgba(255, 255, 255, 0.1),
                0 0 10px rgba(0, 0, 0, 0.8);
            z-index: 2;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        /* Static Arrows Layer */
        .knob-controls {
            position: absolute;
            left: 60px;
            /* Moved inside for better visibility */
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 120px;
            /* More space */
            z-index: 10;
            pointer-events: none;
        }

        .control-arrow {
            width: 100px;
            /* Much larger */
            height: 100px;
            color: var(--white);
            /* Clearly visible */
            cursor: pointer;
            pointer-events: auto;
            transition: transform 0.2s, opacity 0.2s, color 0.2s;
            filter: drop-shadow(0px 2px 4px rgba(0, 0, 0, 0.8));
            /* Strong shadow for contrast */
        }

        .control-arrow:hover {
            color: rgba(255, 255, 255, 0.9);
        }

        /* Align with curve and maintain on hover */
        .arrow-up {
            transform: rotate(-15deg);
        }

        .arrow-up:hover {
            transform: rotate(-15deg) scale(1.1);
        }

        .arrow-down {
            transform: rotate(15deg);
        }

        .arrow-down:hover {
            transform: rotate(15deg) scale(1.1);
        }

        /* Right Content Area */
        .blog-carousel {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
            background-color: var(--white);
            padding: 2rem;
            overflow: hidden;
        }

        .blog-card {
            width: 90%;
            /* Wider for landscape */
            max-width: 800px;
            height: 70%;
            /* Taller to fit content */
            background: var(--white);
            border: 2px solid var(--black);
            padding: 3rem;
            position: absolute;
            transition: all 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
            opacity: 0;
            transform: translateX(100px) rotateY(-10deg);
            display: flex;
            flex-direction: column;
            box-shadow: 15px 15px 0px rgba(0, 0, 0, 0.1);
            overflow-y: auto;
            /* Allow scrolling for long content */
        }

        /* ... existing active/prev/next/typography ... */
        .blog-card.active {
            opacity: 1;
            transform: translateX(0) rotateY(0);
            z-index: 10;
        }

        .blog-card.prev {
            opacity: 0;
            transform: translateY(-100%) rotate(-10deg);
            z-index: 5;
        }

        .blog-card.next {
            opacity: 0;
            transform: translateY(100%) rotate(10deg);
            z-index: 5;
        }

        .blog-date {
            font-family: 'Patrick Hand', cursive;
            color: var(--gray-500);
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .blog-title {
            font-family: 'Patrick Hand', cursive;
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            line-height: 1.1;
        }

        .blog-excerpt {
            font-family: 'Inter', sans-serif;
            font-size: 1.2rem;
            line-height: 1.6;
            color: var(--gray-700);
            margin-bottom: 2rem;
            flex-shrink: 0;
        }

        .blog-body {
            font-family: 'Inter', sans-serif;
            font-size: 1.1rem;
            line-height: 1.6;
            color: var(--gray-800);
            margin-bottom: 2rem;
            white-space: pre-wrap;
            /* Preserve newlines */
        }

        /* Mobile responsive */
        @media(max-width: 768px) {
            .blog-wrapper {
                flex-direction: column;
                height: auto;
                min-height: 90vh;
            }

            .controls-panel {
                width: 100%;
                height: 150px;
                border-bottom: none;
                justify-content: center;
                overflow: hidden;
            }

            .knob-wrapper {
                width: 100%;
                height: 100%;
                left: 0;
                justify-content: center;
                align-items: flex-end;
                /* Knob at bottom */
            }

            .rotary-knob {
                width: 300px;
                height: 300px;
                left: auto;
                bottom: -150px;
                /* Peak out top half */
                position: relative;
            }

            .knob-controls {
                flex-direction: row;
                gap: 150px;
                top: 20px;
                left: 50%;
                transform: translateX(-50%);
            }
        }
    </style>
</head>

    <script>
        // Sample Blog Data
        const BLOG_POSTS = [
            {
                id: 44,
                date: 'Jan 29, 2026',
                title: "Memory as a First-Class Component in Intelligent Systems",
                excerpt: "Most deep learning models are stateless at inference. In real-world systems, memory is not optional—context accumulates over time...",
                body: `Most deep learning models are stateless at inference. Each input is treated independently, even when the environment clearly has continuity.

In real-world systems, memory is not optional. Context accumulates over time:

A robot navigating terrain learns where slippage occurred

A sensor system observes seasonal patterns

A diagnostic system sees gradual degradation

Embedding memory can be done at multiple levels:

Temporal models (LSTMs, transformers with time windows)

External memory buffers storing recent states

Feature-level aggregation across time

Hybrid symbolic memory (rules + learned signals)

Intelligence emerges when systems remember enough to adapt, but forget enough to remain flexible. Memory should not just store data — it should store useful context for decision-making.`
            },
            {
                id: 3,
                date: 'Jan 27, 2026',
                title: "Why AI Can Learn (Almost) Anything",
                excerpt: "Human learning and machine learning aren’t that different at the core. Both adjust internal representations based on feedback — the difference is scale and speed...",
                body: `At a high level, learning is simple: try something, see the result, adjust.

Humans do this with neurons and experience. AI does it with parameters and gradients. The mechanism — updating internal representations based on error — is surprisingly aligned.

The difference isn’t that AI has a magical ability. It’s that machines can repeat this adjustment process millions of times, across massive datasets, at a speed biology can’t match. Scale turns a simple learning rule into seemingly complex intelligence.`
            },
            {
                id: 30,
                date: 'Jan 27, 2026',
                title: "Robustness Is the New Accuracy",
                excerpt: "For years, we optimized AI for accuracy. But accuracy alone is a luxury metric. Robustness is about stability under stress...",
                body: `For years, we optimized AI for accuracy. But accuracy alone is a luxury metric.

A model that is 99% accurate in perfect conditions but fails unpredictably in the field is less useful than one that is 92% accurate but consistently reliable. Real systems must handle noise, uncertainty, and incomplete inputs without collapsing.

Robustness is about stability under stress.
It’s the difference between a demo and a deployable system.

The future of AI isn’t just about being right — it’s about failing safely and predictably.`
            },
            {
                id: 20,
                date: 'Jan 26, 2026',
                title: "Sometimes Addition Beats Convolution",
                excerpt: "We often use complex operations to combine features, but in some cases simple addition can force cleaner, more structured representations...",
                body: `Feature combination in neural networks is often done through learned convolutions or dense layers. But there’s an interesting idea in constraining models to add features instead.

When addition is enforced, the network has to learn representations that combine meaningfully in a shared space. Training then acts like an implicit feature alignment process.

Complex operations give flexibility. Simple ones can encourage structure. Sometimes limiting how features interact leads to more interpretable and efficient learning.`
            },
            {
                id: 45,
                date: 'Jan 25, 2026',
                title: "Designing for Distribution Shift, Not Just Training Accuracy",
                excerpt: "Most models are trained and validated on data drawn from the same distribution. Deployment data rarely follows that rule. Practical AI design must assume shift as the default...",
                body: `Most models are trained and validated on data drawn from the same distribution. Deployment data rarely follows that rule.

Lighting changes. Sensors age. Hardware varies. User behavior evolves. These are not edge cases — they are the norm. A model that performs well only under training conditions is not intelligent; it is overfit to a moment in time.

Practical AI design must assume distribution shift as the default. That means:

Monitoring input statistics in deployment

Designing features that are invariant to environmental noise

Including uncertainty estimation instead of only point predictions

Building fallback logic when confidence drops

Accuracy on a held-out test set measures memorization of the past.
Robustness under shifting conditions measures readiness for the future.`
            },
            {
                id: 33,
                date: 'Jan 24, 2026',
                title: "Intelligence Is Context, Not Just Computation",
                excerpt: "Raw computation is not intelligence. Context is. A system that understands where it is and what matters will outperform a complex blind system...",
                body: `Raw computation is not intelligence. Context is.

A system that understands where it is, what matters in that environment, and how conditions are changing will outperform a more complex system that lacks situational awareness. Intelligence is not just pattern recognition — it’s meaningful interpretation.

Context allows systems to adapt instead of retrain.
To adjust instead of restart.
To work with the world instead of against it.`
            },
            {
                id: 8,
                date: 'Jan 23, 2026',
                title: "Scaling Isn’t the Same as Learning",
                excerpt: "Bigger models aren’t always smarter models. True learning efficiency comes from architectures that compress knowledge effectively, not just store more of it...",
                body: `Throwing more parameters at a problem can improve performance — but it’s not the same as learning efficiently.

A model is essentially a compression system. It encodes patterns from data into weights. Good architectures compress the right structure with fewer parameters. Bad ones just memorize more.

Progress isn’t just about scale. It’s about how well an architecture turns experience into compact, reusable knowledge.`
            },
            {
                id: 6,
                date: 'Jan 23, 2026',
                title: "Simple Models Run the World",
                excerpt: "We celebrate deep learning, but most real-world decisions still run on regression and tree-based models — and that’s not a weakness...",
                body: `A lot of everyday AI in production isn’t transformers or deep nets. It’s linear regression, logistic regression, and random forests quietly making decisions.

Credit scoring, demand forecasting, risk models, anomaly detection — these problems often have structured data and clear signals. Simple models are faster, easier to debug, and more stable over time.

State-of-the-art matters at the frontier. But for daily business decisions, boring models win more often than we admit.`
            },
            {
                id: 24,
                date: 'Jan 22, 2026',
                title: "AI Will Redefine How Stories Are Made",
                excerpt: "From virtual actors to low-cost visual effects, AI is lowering the barrier to cinematic storytelling — and changing who gets to create...",
                body: `High-end storytelling used to require large teams, expensive actors, and complex visual effects pipelines. AI is starting to compress that stack.

Realistic avatars, synthetic voices, procedural environments, and AI-assisted VFX make it possible to produce scenes that once required major studio budgets.

This doesn’t remove human creativity — it shifts the bottleneck. The future of entertainment may be less about access to resources and more about imagination and direction.`
            },
            {
                id: 1,
                date: 'Jan 21, 2026',
                title: "Backpropagation Is the Real Breakthrough",
                excerpt: "We talk about models, data, and scale — but the quiet hero of modern AI is backpropagation. Without it, none of this learning would exist...",
                body: `Strip away the hype, GPUs, and billion-parameter models, and modern AI stands on one core idea: backpropagation.

Backprop is what turns a neural network from a static function into a learning system. It gives the model a way to measure how wrong it is and adjust itself layer by layer. That feedback loop is the difference between “a bunch of math” and “a system that improves with experience.”

Bigger models get attention. Smarter optimizers get papers. But backprop is the engine that made learning from data actually practical at scale.`
            },
            {
                id: 43,
                date: 'Jan 20, 2026',
                title: "Edge AI Is a Systems Problem, Not Just Model Compression",
                excerpt: "Running AI on edge devices is often framed as a model compression task. In reality, it is a systems engineering problem involving power, thermal, and latency constraints...",
                body: `Running AI on edge devices is often framed as a model compression task. In reality, it is a systems engineering problem.

Constraints include:

Limited RAM and flash storage

Power budgets

Thermal limits

Real-time latency requirements

Unreliable connectivity

Success depends on co-design:

Model architecture designed with hardware in mind

Quantization-aware training

Efficient data pipelines to reduce I/O overhead

Event-driven inference instead of continuous polling

Smart scheduling to align compute with energy availability

The best edge AI systems are not just small — they are holistically optimized across model, hardware, and workload.`
            },
            {
                id: 32,
                date: 'Jan 19, 2026',
                title: "Frugality: The Forgotten AI Principle",
                excerpt: "In many parts of the world, computing resources are limited. In such environments, frugality is not an aesthetic choice — it is survival...",
                body: `In many parts of the world, computing resources are limited. Power is unreliable. Connectivity is intermittent. In such environments, frugality is not an aesthetic choice — it is survival.

Frugal AI means doing more with less:

Fewer parameters

Lower power

On-device inference

Smarter data use

Constraint-driven design often leads to more elegant solutions. When resources are limited, every operation must justify its existence. That discipline produces systems that are not just efficient — but resilient.`
            },
            {
                id: 25,
                date: 'Jan 18, 2026',
                title: "The Age of Invisible, Everyday AI",
                excerpt: "AI won’t just live in apps and chatbots. It will quietly shape physical products, personalization, and daily life in ways we barely notice...",
                body: `The most transformative technologies often become invisible. AI is heading in that direction — embedded into everyday objects and services.

Personalized products, adaptive environments, and on-demand manufacturing become more practical when AI handles design, optimization, and decision-making behind the scenes.

There may be cultural hesitation, but the economic pull is strong. When personalization becomes cheaper than mass production, AI stops being a feature and becomes infrastructure.`
            },
            {
                id: 27,
                date: 'Jan 14, 2026',
                title: "Why Bigger Models Aren’t Always Better",
                excerpt: "There’s a quiet myth in AI: scale equals intelligence. But scale often hides fragility. Efficiency is not a compromise — it is a design principle...",
                body: `There’s a quiet myth in AI: scale equals intelligence.

Bigger models, more parameters, more GPUs — this arms race has produced impressive results. But scale often hides fragility. Large models assume abundant data, stable infrastructure, and unlimited power. Many real-world applications — agriculture, field robotics, remote sensing — offer none of these luxuries.

Efficiency is not a compromise. It is a design principle.
A smaller model that understands context and adapts to constraints is often more useful than a massive one that collapses outside ideal conditions.

Progress in AI should not just be measured in teraflops — but in how little it needs to do something meaningful.`
            },
            {
                id: 19,
                date: 'Jan 11, 2026',
                title: "Graph ML: Adding Context to Data Points",
                excerpt: "Traditional ML treats samples independently. Graph learning changes that by letting data points talk to their neighbors before making predictions...",
                body: `Most machine learning models assume data points are independent. But in many real systems — social networks, molecules, traffic maps — everything is connected.

Graph Neural Networks handle this by passing messages between neighboring nodes. Each node gathers context from its surroundings, building a richer representation before prediction.

After this exchange, nodes can be treated like informed individuals rather than isolated points. Graph ML doesn’t replace traditional ML — it adds context before applying it.`
            },
            {
                id: 36,
                date: 'Jan 8, 2026',
                title: "Observability for AI Systems",
                excerpt: "Traditional software has logs and metrics. AI systems need similar observability for input distributions, feature statistics, and confidence trends...",
                body: `Traditional software systems have logs, metrics, and traces. AI systems need similar observability.

Key observability signals:

Input data distributions

Feature statistics

Model confidence trends

Error patterns over time

Hardware performance metrics

Without observability, failures appear random. With it, patterns emerge.
An intelligent system should not only make decisions — it should be inspectable and diagnosable.`
            },
            {
                id: 40,
                date: 'Jan 8, 2026',
                title: "Latency Is a Design Constraint, Not an Optimization Step",
                excerpt: "In real-time systems, latency is not a post-training metric — it’s a core design parameter. Decisions made too late are often as bad as wrong decisions...",
                body: `In real-time systems, latency is not a post-training metric — it’s a core design parameter.

Decisions made too late are often as bad as wrong decisions. Latency sources include:

Sensor acquisition delay

Preprocessing overhead

Model inference time

Communication lag

Actuation delay

Design strategies:

Pipeline parallelism

Early-exit architectures for fast approximate decisions

Model cascades where lightweight models filter inputs

Asynchronous processing for non-critical tasks

An intelligent system must be aware not only of what it decides, but when.`
            },
            {
                id: 39,
                date: 'Jan 7, 2026',
                title: "Hybrid Systems: Learned Models + Rule-Based Logic",
                excerpt: "Purely data-driven systems struggle in rare scenarios. Purely rule-based systems lack adaptability. Hybrid architectures combine both for layered intelligence...",
                body: `Purely data-driven systems struggle in rare or safety-critical scenarios. Purely rule-based systems lack adaptability.

Hybrid architectures combine both:

Learned perception modules

Rule-based safety constraints

State machines governing high-level behavior

Heuristic overrides for edge cases

This is not a compromise — it’s layered intelligence.
Learning handles variability. Rules handle boundaries.

The goal is not elegance in architecture diagrams, but predictable behavior under stress.`
            },
            {
                id: 9,
                date: 'Jan 5, 2026',
                title: "Why Traditional ML Hits a Ceiling",
                excerpt: "Classic ML works well for narrow patterns, but human-like performance needs context, semantics, and an understanding of the scene — not just features...",
                body: `Traditional machine learning is great at pattern recognition within a defined feature space. But the real world isn’t just patterns — it’s context.

Humans don’t just see pixels; we see objects, relationships, intent, and environment. To approach that level, AI systems need semantic and spatial understanding, not just statistical correlations.

Without context, models stay narrow. With scene-level reasoning, they start behaving more like systems that actually understand their environment.`
            },
            {
                id: 21,
                date: 'Jan 2, 2026',
                title: "AI Is This Generation’s Internet Moment",
                excerpt: "Like the internet and GUIs before it, AI isn’t just a tool — it’s an interface shift. The winners will be the ones who learn to ride it early...",
                body: `Some technologies don’t just improve workflows — they change the playing field. The internet was one. Graphical interfaces were another. AI is joining that list.

Companies that treat AI as a side feature will lag behind those that redesign their workflows around it. History shows this pattern clearly: early adopters of paradigm shifts don’t just survive — they lead.

A human can’t outrun a horse. But a human riding a horse changes the race entirely. AI is that multiplier.`
            },
            {
                id: 18,
                date: 'Jan 2, 2026',
                title: "Transformers Are a Milestone, Not the Destination",
                excerpt: "Transformers solved long-range dependencies with efficient representation, but not every problem looks like language. New paradigms are still ahead...",
                body: `Transformers were a breakthrough because they handled long-range dependencies while compressing information efficiently. That made them perfect for language and sequence modeling.

But not all intelligence is sequence prediction. Real-time control, embodied reasoning, and continuous interaction with the world demand different constraints and representations.

LLMs are a major stop on the journey. But they’re a rest area, not the final city. New architectures will be needed for systems that live outside text.`
            },
            {
                id: 42,
                date: 'Dec 31, 2025',
                title: "Confidence Estimation Is as Important as Prediction",
                excerpt: "Many deployed systems treat model outputs as absolute truth. But a system that cannot express uncertainty is dangerous in real-world decision loops...",
                body: `Many deployed systems treat model outputs as absolute truth. But neural networks are not calibrated by default.

A system that cannot express uncertainty is dangerous in real-world decision loops. Confidence estimation allows systems to know when to defer, retry, or escalate.

Technical strategies include:

Monte Carlo dropout for approximate Bayesian inference

Deep ensembles for variance-based confidence

Temperature scaling for calibration

Out-of-distribution detection using feature space distance

Prediction without confidence is guesswork with good PR.
Reliable systems don’t just say what — they indicate how sure they are.`
            },
            {
                id: 31,
                date: 'Dec 31, 2025',
                title: "Human-in-the-Loop Is Not a Weakness",
                excerpt: "There’s a misconception that involving humans means the system isn’t advanced enough. In reality, the strongest systems know when to ask for help...",
                body: `There’s a misconception that involving humans means the system isn’t advanced enough.

In reality, the strongest systems know when to ask for help. Human judgment, context awareness, and ethical reasoning are not bugs in automation — they are features. The goal is not full autonomy at any cost, but meaningful collaboration between humans and machines.

A well-designed system amplifies human ability instead of sidelining it.
Intelligence should support decisions, not silently replace them.`
            },
            {
                id: 17,
                date: 'Dec 31, 2025',
                title: "AI Hasn’t Even Left the Shore Yet",
                excerpt: "The industry is obsessed with LLMs, but they’re just one slice of intelligence. Perception and action in the real world remain largely unsolved...",
                body: `Right now, AI feels synonymous with large language models. But language is only one dimension of intelligence — and not even the hardest one.

Perception, physical interaction, adaptability in dynamic environments — these are far more complex challenges. Getting a robot to reliably act in the real world is still an open frontier.

We’re celebrating systems that talk well. The real revolution comes when systems can see, decide, and act with the same flexibility.`
            },
            {
                id: 28,
                date: 'Dec 30, 2025',
                title: "Automation Should Reduce Complexity, Not Add It",
                excerpt: "Ironically, many “smart” systems make life more complicated. Good automation is invisible and works quietly to remove friction...",
                body: `Ironically, many “smart” systems make life more complicated.

Dashboards that need dashboards. Alerts that create more noise than insight. Tools that demand constant supervision. Technology was meant to reduce cognitive load, yet we often build systems that require humans to adapt to machines instead of the other way around.

        let currentIndex = 0;
        let currentRotation = 0;
        const knob = document.getElementById('knob');
        const container = document.getElementById('carousel-container');

        // Init
        function init() {
            renderCards();
            updateState();
        }

        function renderCards() {
            container.innerHTML = '';
            BLOG_POSTS.forEach((post, index) => {
                const card = document.createElement('div');
                card.className = `blog-card ${index === currentIndex ? 'active' : ''}`;
                card.id = `card-${index}`;

                card.innerHTML = `
                    <div class="blog-date">${post.date}</div>
                    <div class="blog-title">${post.title}</div>
                    <div class="blog-excerpt">${post.excerpt}</div>
                    <div class="blog-body">${post.body ? post.body.replace(/\n\n/g, '<br><br>') : ''}</div>
                `;

                container.appendChild(card);
            });
        }

        function rotateKnob(direction) {
            // Direction: 1 (down/next), -1 (up/prev)

            // Check bounds
            if (direction === 1 && currentIndex >= BLOG_POSTS.length - 1) return; // End of list
            if (direction === -1 && currentIndex <= 0) return; // Start of list

            currentIndex += direction;
            currentRotation += (direction * 45); // Rotate 45 deg per step

            updateState();
        }

        function updateState() {
            // Rotate Knob
            knob.style.transform = `rotate(${currentRotation}deg)`;

            // Update Cards
            const cards = document.querySelectorAll('.blog-card');
            cards.forEach((card, index) => {
                card.className = 'blog-card'; // Reset
                if (index === currentIndex) {
                    card.classList.add('active');
                } else if (index < currentIndex) {
                    card.classList.add('prev'); // Gone up
                } else {
                    card.classList.add('next'); // Waiting down
                }
            });

            // Update Arrows Visual State (Disable if at ends)
            document.querySelector('.arrow-up').style.opacity = currentIndex === 0 ? '0.3' : '1';
            document.querySelector('.arrow-up').style.pointerEvents = currentIndex === 0 ? 'none' : 'auto';

            document.querySelector('.arrow-down').style.opacity = currentIndex === BLOG_POSTS.length - 1 ? '0.3' : '1';
            document.querySelector('.arrow-down').style.pointerEvents = currentIndex === BLOG_POSTS.length - 1 ? 'none' : 'auto';
        }

        window.onload = init;

    </script>
