<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research | My Name</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Roboto:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Page Specific Layout */
        .research-layout {
            display: flex;
            gap: 4rem;
            min-height: 60vh;
        }

        .research-list {
            flex: 1;
            border-right: 1px solid var(--border-light);
            padding-right: 2rem;
        }

        .research-display {
            flex: 2;
            padding-top: 1.5rem;
        }

        .research-item {
            padding: 1rem 0;
            border-bottom: 1px solid var(--border-light);
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .research-item:hover {
            color: var(--black);
        }

        .research-item.active {
            font-weight: 700;
            color: var(--black);
            border-right: 3px solid var(--black);
            margin-right: -2rem;
            /* Pull border onto the line */
            padding-right: calc(2rem - 3px);
        }

        .load-btn {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gray-500);
            margin-top: 0.5rem;
            display: inline-block;
            pointer-events: none;
            /* purely visual, the whole item is clickable */
        }

        /* Responsive */
        @media (max-width: 768px) {
            .research-layout {
                flex-direction: column;
                gap: 2rem;
            }

            .research-list {
                border-right: none;
                border-bottom: 1px solid var(--border-light);
                padding-right: 0;
                padding-bottom: 2rem;
            }
        }
    </style>
</head>

<body>

    <header></header>
    <nav class="main-nav"></nav>

    <main class="container">
        <section class="mt-4 mb-4">
            <h1>Research</h1>
            <p>Investigations into structure, intelligence, and systems.</p>
        </section>

        <section class="research-layout mb-4">
            <!-- LEFT COLUMN: LIST -->
            <div class="research-list">
                <div class="research-item" onclick="loadProject('chroma-sense', this)">
                    <h3>Chroma-Sense</h3>
                    <span class="load-btn">Load Details →</span>
                </div>
                <div class="research-item" onclick="loadProject('weedout', this)">
                    <h3>WeedOut</h3>
                    <span class="load-btn">Load Details →</span>
                </div>
                <div class="research-item" onclick="loadProject('spraycraft', this)">
                    <h3>SprayCraft</h3>
                    <span class="load-btn">Load Details →</span>
                </div>
                <div class="research-item" onclick="loadProject('semantic-search', this)">
                    <h3>Semantic-Search</h3>
                    <span class="load-btn">Load Details →</span>
                </div>
                <div class="research-item" onclick="loadProject('soil', this)">
                    <h3>SOIL</h3>
                    <span class="load-btn">Load Details →</span>
                </div>
                <div class="research-item" onclick="loadProject('xpress-weed', this)">
                    <h3>XpressWeed</h3>
                    <span class="load-btn">Load Details →</span>
                </div>
            </div>

            <!-- RIGHT COLUMN: DISPLAY -->
            <div id="project-display" class="research-display">
                <p style="color: var(--gray-400); font-style: italic;">Select a project to view details.</p>
            </div>
        </section>
    </main>

    <footer></footer>

    <script src="js/main.js"></script>
    <script src="js/research-data.js"></script>
    <script>
        function loadProject(projectId, element) {
            const display = document.getElementById('project-display');
            const project = RESEARCH_DATA[projectId];

            // Highlight active item
            document.querySelectorAll('.research-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');

            if (project) {
                // Fade out effect
                display.style.opacity = 0;

                setTimeout(() => {
                    display.innerHTML = `
                        <h2 class="mb-2">${project.title}</h2>
                        
                        <div class="mb-4">
                            <h4 style="text-transform:uppercase; font-size:0.75rem; color:var(--gray-500); margin-bottom:0.25rem;">Overview</h4>
                            <p>${project.overview}</p>
                            <img src="${project.overviewImage}" alt="Overview" style="width:100%; height:auto; max-height:400px; object-fit:contain; background:#f8f9fa; border-radius:8px; margin-top:1rem; border:1px solid var(--border-light); padding: 1rem;">
                        </div>

                        <div class="mb-4">
                            <h4 style="text-transform:uppercase; font-size:0.75rem; color:var(--gray-500); margin-bottom:0.25rem;">Problem Statement</h4>
                            <p>${project.problem}</p>
                            <img src="${project.problemImage}" alt="Problem Statement" style="width:100%; height:auto; max-height:400px; object-fit:contain; background:#f8f9fa; border-radius:8px; margin-top:1rem; border:1px solid var(--border-light); padding: 1rem;">
                        </div>

                        <div class="mb-4">
                            <h4 style="text-transform:uppercase; font-size:0.75rem; color:var(--gray-500); margin-bottom:0.25rem;">Methodology</h4>
                            <p>${project.methodology}</p>
                        </div>

                        <div class="mb-4">
                            <h4 style="text-transform:uppercase; font-size:0.75rem; color:var(--gray-500); margin-bottom:0.25rem;">Key Innovation</h4>
                            <p>${project.novelty}</p>
                            <img src="${project.innovationImage}" alt="Key Innovation" style="width:100%; height:auto; max-height:400px; object-fit:contain; background:#f8f9fa; border-radius:8px; margin-top:1rem; border:1px solid var(--border-light); padding: 1rem;">
                        </div>

                        <div class="mb-4">
                            <h4 style="text-transform:uppercase; font-size:0.75rem; color:var(--gray-500); margin-bottom:0.25rem;">Results</h4>
                            <p>${project.results}</p>
                            <img src="${project.resultsImage}" alt="Results" style="width:100%; height:auto; max-height:400px; object-fit:contain; background:#f8f9fa; border-radius:8px; margin-top:1rem; border:1px solid var(--border-light); padding: 1rem;">
                        </div>

                        <div class="mt-4 flex" style="gap:20px;">
                            <a href="${project.paperLink}" class="btn-text">Read Paper</a>
                            <a href="${project.githubLink}" class="btn-text">View Code</a>
                        </div>
                    `;

                    // Fade in
                    display.style.transition = 'opacity 0.3s ease';
                    display.style.opacity = 1;
                }, 100);
            }
        }



        // Auto-load first item just for better UX? Or leave empty as requested? 
        // User request: "When “Load Details” is clicked..." -> implies explicit action.
        // I'll leave it empty initially as per "Select a project..." placeholder I added.
    </script>
</body>

</html>
