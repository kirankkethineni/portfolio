    <script>

            'sound': {
                title: 'Sound & Cinema',
                bgImage: 'images/sound_cinema_custom_grayscale.png',
                topics: [
                    {
                        id: 'cinema-motion',
                        label: 'Cinema',
                        content: 'Cinema is motion born from limitation. Our eyes cannot process beyond a certain speed, and technology turned that boundary into magic — still images moving with life. What began as an illusion became a companion: a storyteller in every home, a source of comfort, motivation, and shared emotion across generations.'
                    },
                    {
                        id: 'cartoon-craft',
                        label: 'Cartoons',
                        content: 'Cartoons were born from patience and imagination. Before computers, artists drew every frame by hand, breathing life into characters that could speak, emote, and move like us. We knew they were not real, yet we felt for them. Animation and VFX later expanded the medium, but the heart of cartoons remains the same — turning imagination into motion, one frame at a time.'
                    },
                    {
                        id: 'cinema-sound-evolution',
                        label: 'Cinema Sound',
                        content: 'Sound in cinema evolved from simple mono tracks to immersive spatial experiences. From optical audio printed on film to magnetic strips, CDs, digital formats, and now object-based systems, audio technology has steadily moved toward one goal: making the audience feel present inside the story, not just watching it.'
                    },
                    {
                        id: '70mm-film',
                        label: '70mm – The Kohinoor',
                        content: 'While digital cameras made filmmaking faster and more flexible, 70mm film remains a pinnacle of visual richness. Its massive frame size captures extraordinary detail and organic texture, often compared to multi-thousand-line digital resolution. The grain carries real-world texture, giving images a depth and natural quality that still feels unmatched in many modern productions.'
                    },
                    {
                        id: 'dts-revolution',
                        label: 'DTS',
                        content: 'DTS changed cinema audio by moving sound off the film strip and into the digital domain. Instead of squeezing audio into optical tracks, DTS synchronized high-quality digital audio from external media with the film projection. The result was cleaner, more dynamic surround sound that redefined what audiences expected from the movie theater experience.'
                    },
                    {
                        id: 'dolby-atmos',
                        label: 'Dolby Atmos',
                        content: 'Dolby Atmos introduced height into cinematic sound. Instead of limiting audio to channels around the audience, it allows sounds to move in three-dimensional space — above, around, and through the scene. This shift from channel-based mixing to object-based placement makes the auditory experience feel more natural and immersive than ever before.'
                    },
                    {
                        id: 'nolan-film-choice',
                        label: 'Why Nolan Still Shoots Film',
                        content: 'Christopher Nolan’s continued use of IMAX film and traditional 5.1 audio may seem old-fashioned, but it reflects a focus on purity and consistency. Large-format film preserves immense visual detail with organic texture, while uncompressed surround formats maintain dynamic range without aggressive processing. His approach favors faithful capture and presentation over technological excess.'
                    },
                    {
                        id: 'cd-quality-audio',
                        label: 'CD Quality / WAV',
                        content: 'CD-quality audio set the baseline for faithful digital sound reproduction. With a sampling rate high enough to capture the full human hearing range and sufficient bit depth for subtle dynamics, it preserves details often lost in compressed formats. While modern codecs prioritize convenience, uncompressed audio remains the reference for clarity and realism.'
                    },
                    {
                        id: 'loudness-normalization',
                        label: 'Loudness Normalization',
                        content: 'Loudness normalization aims to keep audio levels consistent, but in doing so it can reduce emotional impact. Explosions lose their intensity and whispers lose their intimacy when dynamic range is compressed. While the technology improves listening comfort, it can also flatten the expressive contrast that gives cinematic sound its power.'
                    },
                    {
                        id: 'bluray-era',
                        label: 'Blu-ray: The Peak of Physical Media',
                        content: 'Physical media brought cinema home without stripping away its essence. From VCD to DVD and finally Blu-ray and 4K UHD, each step improved how faithfully movies could be stored and replayed. Blu-ray in particular allowed films to be distributed with minimal compression, preserving high-quality video and lossless audio at an accessible price — a moment where convenience and fidelity briefly aligned.'
                    },
                    {
                        id: 'streaming-tradeoff',
                        label: 'The Streaming Tradeoff',
                        content: 'Streaming prioritizes accessibility and scale, which often means aggressive compression. To serve millions of viewers across varying internet speeds, platforms reduce bitrate, normalize sound, and standardize presentation. The result is convenience at the cost of nuance — subtle details in both audio and video are softened so that delivery remains smooth for everyone.'
                    },
                    {
                        id: 'fake-hires',
                        label: 'The Illusion of Hi-Res Audio',
                        content: 'High-resolution audio promises greater detail through higher bitrates and sampling rates, but quality depends on more than numbers. Many modern masters are processed for loudness consistency and optimized for small speakers or earbuds, reducing dynamic range and subtle textures. The file may be “hi-res” in specification, but the listening experience is often shaped by modern playback habits rather than pure fidelity.'
                    },
                    {
                        id: 'dts-vs-dolby',
                        label: 'DTS vs Dolby',
                        content: 'DTS and Dolby both aim to deliver immersive sound, but they are often perceived differently in character. DTS mixes are sometimes associated with higher dynamic range and a more aggressive presentation, while Dolby formats are known for controlled balance and wider compatibility. The experience ultimately depends on system calibration, room acoustics, and the mix itself as much as the format name.'
                    },
                    {
                        id: 'analog-fidelity',
                        label: 'Analog Roots, Digital Challenges',
                        content: 'Despite advances in many technologies, high-fidelity audio reproduction still demands precision hardware. Quality digital-to-analog conversion, low-noise circuitry, and carefully engineered components remain costly. Audio may be digital in storage, but faithful playback still relies on analog craftsmanship — a reminder that some frontiers of engineering move more slowly than others.'
                    },
                    {
                        id: 'gramophone-era',
                        label: 'The Gramophone',
                        content: 'The gramophone was one of the first ways humans captured sound in a truly physical form. Vibrations were etched into grooves, turning air movement into something you could touch and replay. Early mechanical players, powered by springs and careful engineering, used clever speed regulation to keep playback steady. It was a masterpiece of motion, mechanics, and acoustic intuition long before electronics took over.'
                    },
                    {
                        id: 'analog-digital-mix',
                        label: 'Is Anything Truly Digital?',
                        content: 'We call modern systems “digital,” yet much of audio reproduction still depends on analog stages. Many amplifiers use analog Class AB designs because they remain practical and capable of high-quality output. Even in digital systems, signals eventually become electrical waves that move speakers. What we experience today is not purely digital or purely analog, but a blend of both worlds.'
                    },
                    {
                        id: 'thx-certification',
                        label: 'THX',
                        content: 'THX began as a quality standard to ensure theaters could reproduce film sound as intended by creators. It set requirements for acoustics, speaker performance, and dynamic range so audiences could hear movies with clarity and impact. More than a format, THX represented a commitment to faithful playback — a reminder that the listening environment matters as much as the source.'
                    },
                    {
                        id: 'film-dts-era',
                        label: 'Film + DTS Era',
                        content: 'Large-format film paired with early digital theater sound marked a powerful period in cinema presentation. High-detail analog images combined with dynamic, less-compressed digital audio created an experience many still remember as uniquely rich. It was a time when visual texture and impactful sound met at a scale that felt both grand and immersive.'
                    },
                    {
                        id: 'anamorphic-dvd',
                        label: 'Anamorphic DVD',

                    },
                    {
                        id: 'psychoacoustics',
                        label: 'Psychoacoustics',
                        content: 'Audio perception is shaped as much by psychology as by physics. Modern sound systems often use digital signal processing to adapt audio for smaller speaker setups, reshaping frequencies and dynamics so the result feels fuller or more immersive than the hardware alone could produce. These techniques make good sound more accessible, but they also mean what we hear is often a carefully crafted interpretation rather than a strictly neutral reproduction.'
                    }
                ]

                    {

                    {

                        id: 'civilization-purpose',

                    },
                    {
                        id: 'survival-of-fittest',

                        content: 'Though modern life feels removed from nature, the principle of adaptation still operates in human systems. Those who adapt better to changing environments, skills, and social structures tend to thrive. “Fitness” today may mean emotional intelligence, learning ability, or social adaptability rather than physical strength.'
                    },
                    {
                        id: 'society-vs-mind',
                        label: 'Society vs The Human Mind',
                        content: 'Society evolves faster than the human mind can biologically adapt. Technology, expectations, and social pressures change within decades, while our emotional wiring developed over thousands of years. This mismatch often leads to stress, anxiety, and identity struggles as individuals try to keep pace with rapid external change.'
                    },
                    {
                        id: 'caste-and-elitism',
                        label: 'Caste & Elitism',
                        content: 'Systems of hierarchy often arise from the ego’s need for superiority and security. Whether through caste, class, or status symbols, humans create layers of identity that place some above others. These structures offer psychological comfort to those on top, but deepen division and distance within society.'
                    },
                    {
                        id: 'power-of-words',
                        label: 'The Psychology of Harsh Words',
                        content: 'Words carry emotional weight beyond their literal meaning. Harsh or demeaning language often reflects a need to dominate or release frustration rather than communicate truth. Repeated exposure to such language can leave lasting psychological impressions, shaping how people see themselves and others.'
                    },
                    {
                        id: 'truth-and-comfort',
                        label: 'Truth Needs Soft Edges',
                        content: 'Raw truth can be difficult to accept because it challenges identity, beliefs, and emotional comfort. People often respond better when truth is delivered with empathy and understanding. How something is said can matter as much as what is said, because the mind resists threat but opens to care.'
                    },
                    {
                        id: 'ego-in-relationships',
                        label: 'Ego in Relationships',
                        content: 'Every relationship involves two identities shaped by different experiences and expectations. When ego dominates, interactions become battles of being right rather than attempts to understand. Letting go of rigid self-importance creates space for empathy, compromise, and connection. In many ways, healthy relationships require the softening — not the strengthening — of ego.'
                    },
                    {
                        id: 'identity-is-constructed',

                        content: 'What we call “personality” is not a fixed entity but a layered construction built from memory, environment, and social feedback. The roles we play — professional, friend, family member — shape how we see ourselves. Change the environment, and identity slowly reshapes itself. The “self” is less a solid object and more an ongoing story.'
                    },
                    {
                        id: 'fear-drives-control',
                        label: 'Fear and Control',
                        content: 'Much controlling behavior arises from fear rather than strength. Fear of loss, fear of rejection, fear of uncertainty — these push people to hold tighter to situations and people. What looks like authority from the outside is often insecurity seeking stability.'
                    },
                    {
                        id: 'comparison-trap',
                        label: 'The Comparison Trap',
                        content: 'Comparison is built into social living, but constant comparison distorts self-worth. When identity is measured only against others, satisfaction becomes unstable. Someone else will always be ahead in some dimension. Peace grows when comparison shifts from others to one’s own past growth.'
                    },
                    {
                        id: 'emotions-are-signals',
                        label: 'Emotions as Signals',
                        content: 'Emotions are not enemies to suppress but signals to understand. Anger may point to violated boundaries, sadness to loss, anxiety to uncertainty. When emotions are listened to rather than judged, they become guides rather than disturbances.'
                    },
                    {
                        id: 'validation-cycle',
                        label: 'The Need for Validation',

                    },
                    {
                        id: 'conflict-and-perception',
                        label: 'Conflict Is Perception',
                        content: 'Most conflicts arise not from facts but from interpretations of facts. Two people can experience the same event and walk away with different emotional meanings. Understanding this reduces the urge to prove and increases the ability to listen.'
                    },
                    {
                        id: 'growth-through-discomfort',
                        label: 'Growth Through Discomfort',
                        content: 'Comfort preserves stability, but discomfort drives growth. Learning, healing, and change often begin where certainty ends. Avoiding all discomfort may protect peace in the short term but limits expansion in the long run.'
                    },
                    {
                        id: 'forged-by-experience',
                        label: 'Forged by Experience',
                        content: 'People who master their emotions are often shaped by intense life experiences. Hardships, failures, loss, or responsibility at an early age force the mind to observe itself. Repeated exposure to difficulty teaches them that reacting blindly creates more pain, while pausing and choosing a response brings stability. Strength, in many cases, is not gifted — it is forged.'
                    },
                    {
                        id: 'power-of-reflection',

                    {
                        id: 'security-within',
                        label: 'Inner Security',

                    },
                    {
                        id: 'exposure-to-diversity',
                        label: 'Exposure to Different Perspectives',
                        content: 'Those who have seen multiple viewpoints — cultures, struggles, or belief systems — tend to respond with greater balance. Exposure reduces rigidity. When a person understands that every action has context, anger softens into curiosity, and reaction transforms into considered response.'
                    },
                    {
                        id: 'learning-the-cost-of-reaction',
                        label: 'Learning the Cost of Reaction',
                        content: 'Some learn emotional mastery after experiencing the damage caused by uncontrolled reactions. Words spoken in anger, decisions made in impulse, and relationships strained by ego leave lasting lessons. Over time, the memory of those consequences becomes a guide toward restraint and thoughtful action.'
                    },
                    {
                        id: 'discipline-of-mind',

                        content: 'Just as the body becomes strong through physical training, the mind gains stability through mental discipline. Practices like meditation, journaling, deep thinking, or even solitude train the mind to observe rather than instantly engage. This discipline builds the ability to stay steady in emotionally charged situations.'
                    },
                    {
                        id: 'acceptance-of-uncertainty',
                        label: 'Comfort with Uncertainty',
                        content: 'Emotionally strong individuals often accept that not everything can be controlled. This acceptance reduces anxiety and the urge to overreact. When uncertainty is seen as part of life rather than a threat, responses become calmer and more measured.'
                    },
                    {
                        id: 'compassion-through-pain',
                        label: 'Compassion Through Pain',
                        content: 'Having experienced pain themselves, emotionally mature people often develop deeper compassion for others. Instead of reacting with judgment, they recognize struggle in different forms. This empathy slows reaction and encourages responses that heal rather than harm.'
                    }
                ]
            },
            'spirituality': {
                title: 'Spirituality',
                bgImage: 'images/sketch_spirituality.png',
                topics: [
                    {
                        id: 'who-am-i',
                        label: 'Who Am I?',
                        content: 'We usually identify ourselves with the physical body or with the thoughts and ideologies running in the mind. But if something is truly “me,” it must remain constant. The body changes and eventually remains behind, and thoughts are largely shaped by surroundings and experiences — reactions in a long chain of cause and effect. When we negate both — “I am not the body, I am not the mind” — what remains is the awareness that accompanies life from beginning to end: chaitanyam, the inner consciousness. That presence, the simple sense of “I am that,” is what many traditions point to as our true nature.'
                    },
                    {
                        id: 'illusion-of-i',
                        label: 'The Illusion of “I”',
                        content: 'If identity lies in consciousness rather than body or mind, then individuality becomes less solid. Consciousness appears in different forms, yet its essence may be one. Energy is never created or destroyed, and though we cannot trace consciousness scientifically, many traditions attribute its source to the divine. From this view, we are not separate beings but expressions of one supreme consciousness. The sense of “I” becomes a role within a larger oneness.'
                    },
                    {
                        id: 'advaita-vedanta',
                        label: 'Advaita Vedanta',
                        content: 'Advaita Vedanta teaches non-duality — the idea that all existence is one. Phrases like “Aham Brahmasmi” (I am Brahman), “Shivoham” (I am Shiva), and “Tat Tvam Asi” (You are That) express the same truth: there is no real separation between you and me. Some describe life as a dream of Vishnu, where every being is part of the same whole. If we are truly one, then jealousy and ego lose their meaning, and living in harmony becomes the natural way of being.'
                    },
                    {
                        id: 'on-imperfection',
                        label: 'On Imperfection',
                        content: 'No person is entirely perfect or entirely flawed — differences often lie only in degree. People are shaped by their upbringing, environment, and experiences, which makes them reflections of the circumstances they grew within. Society may need accountability to prevent harm, but personal hatred loses meaning when we see that every ill-mannered person is, in some way, a wounded one.'
                    },
                    {
                        id: 'concept-of-god',
                        label: 'The Idea of God',
                        content: 'There may be no definitive scientific proof of God, yet there is also no complete explanation for when consciousness begins or what gives rise to inner awareness. The word “God” becomes a way to name this mystery — the source behind life, awareness, and existence itself. Whether seen as a being, a force, or an unknown principle, it reflects humanity’s attempt to relate to what lies beyond full understanding.'
                    },
                    {
                        id: 'dream-or-simulation',
                        label: 'Dream & Simulation',
                        content: 'Some see it as superstition to describe life as a divine dream, yet are open to the idea that we might live in a simulation. Both perspectives suggest that what we experience as reality may arise from a deeper source. Just as our dreams create convincing worlds and characters, our waking life may also be part of a larger unfolding. If we name that source, some call it Vishnu, others call it God — different languages for a shared mystery.'
                    },
                    {
                        id: 'understanding-ego',
                        label: 'Understanding Ego',
                        content: 'Ego is often misunderstood as arrogance, but it is simply the collection of identity, feelings, and opinions shaped by our surroundings. If we had grown up in different circumstances, we might think and act very differently. From this perspective, actions are often responses to situations rather than expressions of inherent good or evil. Seeing this does not remove responsibility, but it softens personal hostility. People become participants in a larger play of causes and effects rather than isolated authors of every action.'
                    },
                    {
                        id: 'dharma',
                        label: 'Dharma',
                        content: 'Dharma can be seen as the way of living in alignment with compassion, balance, and responsibility. When identity is no longer limited to body and mind, emotions like hatred and jealousy lose their hold, and empathy becomes the natural state. Actions done without expectation are expressions of love rather than transactions of the ego. Yet dharma is not passive — protecting others from harm is also part of it. This idea is beautifully illustrated in the Bhagavad Gita, where Krishna reminds Arjuna that standing against injustice is also a duty, performed without personal hatred and without attachment to outcomes. We are responsible for our actions, while results unfold within a larger order beyond individual control.'
                    }

            'cars': {

                        content: 'Automotive engineering has always balanced power, efficiency, and control. Early steam engines proved motion was possible, internal combustion made it practical, and modern turbocharged systems push performance further from smaller engines. From mechanical simplicity to electronically controlled twin-turbo setups, each step reflects the same goal: extracting more usable energy while managing heat, weight, and reliability.'
                    },
                    {
                        id: 'naturally-aspirated',

                        content: 'Naturally aspirated engines rely purely on atmospheric pressure to fill their cylinders. Without forced induction, power delivery feels linear, predictable, and directly connected to throttle input. The sound, response, and mechanical purity create a driving experience that many enthusiasts value not just for speed, but for the honesty of how power is produced.'

                    {

                    },
                    {

                    },
                    {

                    },
                    {

        // DOM Elements
        const viewMap = document.getElementById('view-map');
        const viewLandscape = document.getElementById('view-landscape');
        const viewContent = document.getElementById('view-content');
        const viewGallery = document.getElementById('view-gallery');
        const backBtn = document.getElementById('back-btn');

        // Transitions
        function transitionTo(nextView, direction) {
            const currentView = getViewElement(currentLevel);

            if (direction === 'forward') {
                nextView.classList.remove('prev');
                nextView.classList.add('next');
                void nextView.offsetWidth; // Force reflow
                currentView.classList.remove('active');
                currentView.classList.add('prev');
                nextView.classList.remove('next');
                nextView.classList.add('active');
            } else {
                nextView.classList.remove('next');
                nextView.classList.add('prev');
                void nextView.offsetWidth; // Force reflow
                currentView.classList.remove('active');
                currentView.classList.add('next');
                nextView.classList.remove('prev');
                nextView.classList.add('active');
            }
        }

        function getViewElement(level) {
            if (level === 0) return viewMap;
            if (level === 1) return viewLandscape;
            if (level === 2) return viewContent;
            if (level === 3) return viewGallery;
        }

        function updateUI() {
            backBtn.style.display = currentLevel > 0 ? 'block' : 'none';
        }

        // Navigation Actions
        function goToLandscape(key) {
            currentTopicKey = key;
            const data = DATA[key];
            if (!data) return;

            document.getElementById('landscape-title').innerText = data.title;
            const container = document.getElementById('landscape-canvas');
            const viewSection = document.getElementById('view-landscape');

            // Set Background Image with stylistic filter
            if (data.bgImage) {
                // Apply a lighter matte overlay (30% opacity)
                viewSection.style.backgroundImage = `linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), url('${data.bgImage}')`;
                viewSection.style.backgroundSize = 'cover';
                viewSection.style.backgroundPosition = 'center';
                viewSection.style.backgroundBlendMode = 'normal';
            } else {
                viewSection.style.backgroundImage = 'none';
            }

            container.innerHTML = ''; // Clear

            // Render Topics
            data.topics.forEach(topic => {
                const el = document.createElement('div');
                el.className = 'topic-marker';
                el.innerText = topic.label;
                el.onclick = () => goToContent(topic.label, topic.content);
                container.appendChild(el);
            });

            // Add "My Clicks" Button if Photography
            if (key === 'photography') {
                const galleryBtn = document.createElement('div');
                galleryBtn.className = 'topic-marker';
                galleryBtn.innerText = 'My Clicks';
                galleryBtn.onclick = () => openGallery();
                container.appendChild(galleryBtn);
            }

            transitionTo(viewLandscape, 'forward');
            currentLevel = 1;
            updateUI();
        }

        function openGallery() {
            const container = document.getElementById('gallery-grid');
            container.innerHTML = '';

            // Loop for processed photos (1 to 71)
            for (let i = 1; i <= 71; i++) {
                const img = document.createElement('img');
                img.src = `images/gallery/photo_${i}.jpg`;
                img.style.width = '100%';
                img.style.height = '100%'; /* Grid requirement */
                img.style.objectFit = 'cover';
                img.style.borderRadius = '4px';
                img.style.boxShadow = '0 4px 6px rgba(0,0,0,0.1)';
                img.loading = 'lazy';
                img.style.cursor = 'pointer';
                img.onclick = () => openLightbox(img.src);
                container.appendChild(img);
            }

            transitionTo(viewGallery, 'forward');
            currentLevel = 3;
            updateUI();
        }

        function goToContent(title, text) {
            document.getElementById('content-title').innerText = title;
            document.getElementById('content-body').innerText = text;

            // Clear Background for Content View (User Request)
            const viewContent = document.getElementById('view-content');
            viewContent.style.backgroundImage = 'none';

            transitionTo(viewContent, 'forward');
            currentLevel = 2;
            updateUI();
        }

        function goBack() {
            if (currentLevel === 0) return;

            const prevLevel = (currentLevel === 3) ? 1 : currentLevel - 1; // Gallery goes back to Landscape
            transitionTo(getViewElement(prevLevel), 'back');
            currentLevel = prevLevel;
            updateUI();
        }

        // Random Map Generator
        function randomizeMapPositions() {
            const btns = document.querySelectorAll('.map-btn');
            const container = document.querySelector('.map-container');
            const occupied = [];

            btns.forEach(btn => {
                let overlap = true;
                let attempts = 0;
                let top, left;

                while (overlap && attempts < 100) {
                    // Generate random pos between 10% and 80% to avoid edges
                    top = 10 + Math.random() * 70;
                    left = 10 + Math.random() * 70;

                    overlap = false;
                    // Simple collision check (approximate distance > 15%)
                    for (let pos of occupied) {
                        const dist = Math.sqrt(Math.pow(pos.t - top, 2) + Math.pow(pos.l - left, 2));
                        if (dist < 20) { // 20% minimum distance
                            overlap = true;
                            break;
                        }
                    }
                    attempts++;
                }

                if (attempts >= 100) console.warn("Could not place button without overlap");

                occupied.push({ t: top, l: left });

                // Apply styles
                btn.style.top = top + '%';
                btn.style.left = left + '%';
                const rotation = -10 + Math.random() * 20; // -10 to 10 deg
                btn.style.transform = `rotate(${rotation}deg)`;
            });
        }

        // Lightbox Functions
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');

        function openLightbox(src) {
            lightboxImg.src = src;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox(e) {
            if (e.target !== lightboxImg) {
                lightbox.classList.remove('active');
                document.body.style.overflow = 'auto';
            }
        }

        document.addEventListener('keydown', function (e) {
            if (e.key === "Escape" && lightbox.classList.contains('active')) {
                lightbox.classList.remove('active');
                document.body.style.overflow = 'auto';
            }
        });

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            randomizeMapPositions();
        });
    </script>
