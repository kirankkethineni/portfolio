<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exploration | Kiran K. Kethineni</title>
    <link rel="stylesheet" href="css/style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Roboto:wght@300;400;500&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- HEADER injected by main.js -->
    <header></header>

    <!-- NAVIGATION injected by main.js -->
    <nav class="main-nav"></nav>

    <main class="container">
        <section class="mt-4 mb-4 sketch-font" style="text-align: center;">
            <h1 style="font-family: 'Patrick Hand', cursive;">Exploration Map</h1>
            <p style="font-size: 1.2rem;">A map of the ideas and interests I keep returning to.</p>
        </section>

        <div class="view-container">
            <!-- BACK ARROW -->
            <div id="back-btn" class="back-arrow" onclick="goBack()">← Back</div>

            <!-- VIEW 1: THE MAP -->
            <div id="view-map" class="view-section active" style="padding: 0;">
                <div class="map-container"
                    style="position: relative; width: 100%; height: 100%; background-image: url('images/exploration_map_final.png'); background-size: cover; background-position: center; filter: grayscale(100%) contrast(120%);">
                    <!-- Scattered Items (Positions set by JS) -->
                    <button class="sketch-btn map-btn" style="position: absolute;"
                        data-tooltip="How audio shapes emotion and story" onclick="goToLandscape('sound')">Sound &
                        Cinema</button>
                    <button class="sketch-btn map-btn" style="position: absolute;"
                        data-tooltip="Patterns of thought and behavior"
                        onclick="goToLandscape('psychology')">Psychology</button>
                    <button class="sketch-btn map-btn" style="position: absolute;"
                        data-tooltip="Awareness, attention, and inner observation"
                        onclick="goToLandscape('spirituality')">Spirituality</button>
                    <button class="sketch-btn map-btn" style="position: absolute;"
                        data-tooltip="Machines, motion, and mechanical feel"
                        onclick="goToLandscape('cars')">Cars</button>
                    <button class="sketch-btn map-btn" style="position: absolute;"
                        data-tooltip="Light, stillness, and visual memory"
                        onclick="goToLandscape('photography')">Photography</button>
                </div>
            </div>

            <!-- VIEW 2: LANDSCAPE -->
            <div id="view-landscape" class="view-section next">
                <h2 id="landscape-title" class="sketch-font" style="text-align: center;">Landscape Title</h2>
                <div id="landscape-canvas" class="landscape-canvas">
                    <!-- Dynamic Topics injected here -->
                </div>
            </div>

            <!-- VIEW 3: CONTENT -->
            <div id="view-content" class="view-section next">
                <h2 id="content-title" class="sketch-font">Topic Title</h2>
                <div id="content-body" class="timeline-body sketch-font"
                    style="font-size: 1.2rem; white-space: pre-wrap;">
                    <!-- Content injected here -->
                </div>
            </div>

            <!-- VIEW 4: GALLERY -->
            <div id="view-gallery" class="view-section next">
                <h2 class="sketch-font" style="text-align: center; flex-shrink: 0; margin-bottom: 20px;">My Clicks</h2>
                <div id="gallery-grid" class="map-grid"
                    style="padding-bottom: 2rem; height: auto; align-content: start; flex-grow: 1;">
                    <!-- Images injected here -->
                </div>
            </div>
        </div>

    </main>

    <!-- FOOTER injected by main.js -->
    <footer></footer>

    <script src="js/main.js"></script>
    <script>
        // State Management
        let currentLevel = 0; // 0: Map, 1: Landscape, 2: Content, 3: Gallery
        let historyStack = [];
        let currentTopicKey = null; // Track current topic for background persistence

        // Data Store
        const DATA = {
            'sound': {
                title: 'Sound & Cinema',
                bgImage: 'images/sound_cinema_custom_grayscale.png',
                topics: [
                    { id: 'ost', label: 'OSTs', content: 'Exploring the emotional impact of Original Soundtracks in cinema...' },
                    { id: 'sound-design', label: 'Foley', content: 'The art of sound design and foley work...' }
                ]
            },
            'psychology': {
                title: 'Psychology',
                bgImage: 'images/psychology_abstract_sketch.png',
                topics: [
                    { id: 'cog', label: 'Cognitive', content: 'Understanding how we think and process information...' },
                    { id: 'behav', label: 'Behavioral', content: 'Analyzing patterns in human behavior...' }
                ]
            },
            'spirituality': {
                title: 'Spirituality',
                bgImage: 'images/sketch_spirituality.png',
                topics: [
                    { id: 'phil', label: 'Philosophy', content: 'Eastern philosophy and its modern relevance...' },
                    { id: 'med', label: 'Mindfulness', content: 'The practice of presence in a chaotic world...' }
                ]
            },
            'cars': {
                title: 'Cars',
                bgImage: 'images/sketch_cars.png',
                topics: [
                    { id: 'eng', label: 'Engines', content: 'The mechanics of internal combustion and EV powertrains...' },
                    { id: 'des', label: 'Design', content: 'Automotive design languages through the decades...' }
                ]
            },
            'photography': {
                title: 'Photography',
                bgImage: 'images/photography_processed_grayscale.png',
                topics: [
                    {
                        id: 'film-vs-digital',
                        label: 'Film vs Digital',
                        content: 'Film demands mastery before the moment — no previews, no instant correction, only understanding of light, exposure, and timing. Digital makes creation easier, offering endless chances to adjust colors and tones after the shot. One is discipline before capture; the other is freedom after. Both create images, but only one forces you to truly *see* before you press the shutter.'
                    },
                    {
                        id: 'mirrorless-view',
                        label: 'Mirrorless Vision',
                        content: 'Mirrorless cameras show you a processed interpretation of the scene rather than light reflected directly from the world. What you see is already influenced by digital corrections — exposure, white balance, color science. It is convenient and powerful, but it raises a quiet question: are we seeing reality, or the camera’s version of it?'
                    },
                    {
                        id: 'depth-of-field',
                        label: 'The Magic of Depth of Field',
                        content: 'Shallow depth of field makes subjects stand out by blurring the background — a look we’ve grown to love. Yet the human eye rarely sees the world this way. Most of what we look at is in focus, with depth naturally preserved. Photography bends reality here, using blur not to replicate vision, but to guide attention and create emotion.'
                    },
                    {
                        id: 'circle-of-confusion',
                        label: 'Circle of Confusion',
                        content: 'Focus is not absolute — it is a tolerance. Physics allows small light distortions on the sensor that our eyes cannot detect. This is why some areas appear sharp even when they are not perfectly focused. Longer lenses, with gentler light dispersion, keep more of the scene within this acceptable sharpness, while wider lenses lose focus more dramatically. Clarity is a boundary, not a binary.'
                    },
                    {
                        id: 'dslr-vs-mirrorless',
                        label: 'DSLR vs Mirrorless',
                        content: 'Both DSLR and mirrorless cameras share the same core: a sensor capturing light. The difference lies in how we see before the shot. DSLRs use mirrors and prisms to give an optical view straight from reality. Mirrorless systems remove that pathway, showing a digital preview from the sensor itself. One shows the world; the other shows the camera’s interpretation of it.'
                    },
                    {
                        id: 'film-chemistry',
                        label: 'The Chemistry of Film',
                        content: 'Film captures light through chemical reactions. When light hits the film, microscopic silver halide crystals respond, permanently recording the scene. These particles are incredibly fine — so fine that a 35mm frame can rival modern multi-megapixel digital sensors in detail. Film is not just an old technology; it is a physical imprint of light itself.'
                    },
                    {
                        id: 'exposure-triangle',
                        label: 'Shutter, Aperture & ISO',
                        content: 'Every photograph is a balance of energy. Aperture controls how much light enters, shutter speed controls how long it stays, and ISO adjusts how sensitive the sensor is to that light. Fast motion demands quick shutters, which reduce light — so we open the aperture or increase ISO. Push ISO too far, and the sensor begins to record noise along with light. Exposure is a negotiation, not a setting.'
                    },
                    {
                        id: 'grain-vs-noise',
                        label: 'Film Grain vs Digital Noise',
                        content: 'Film grain and digital noise may look similar, but they come from very different origins. Film grain is the texture of chemistry — a natural, organic randomness that adds character. Digital noise is electronic interference, a byproduct of amplified sensor signals. One feels like a signature of the medium; the other feels like a limitation of it.'
                    },
                    {
                        id: 'motion-in-photography',
                        label: 'The Power of Motion',
                        content: 'A still camera freezes the world, but motion within a photograph can make the viewer feel part of it. Moving with waves instead of against them, following a subject rather than observing from stillness — these choices turn documentation into experience. Motion does not just show a scene; it carries the audience into it.'
                    },
                    {
                        id: 'dslr-mechanics',
                        label: 'DSLR Mechanics',
                        content: 'DSLRs rely on physical movement — mirrors must flip and shutters must travel before each image is captured. That mechanical dance introduces a small delay, a reminder that precision takes motion. Mirrorless systems remove these moving parts, gaining speed and silence. DSLRs feel grounded in engineering; mirrorless feels closer to pure light.'
                    },
                    {
                        id: 'film-camera-mastery',
                        label: 'The Film Camera',
                        content: 'Film cameras demand intention. Every frame costs effort, time, and thought. There is no instant feedback, no quick correction — only understanding of light, exposure, and timing. Shooting film feels less like taking pictures and more like practicing a craft, where patience and mastery shape every image.'
                    },
                    {
                        id: 'portraits-bw',
                        label: 'Portraits in B&W',
                        content: 'Black and white portraits remove distraction and elevate emotion. Without color competing for attention, expressions, textures, and light take center stage. The background fades in importance, and the human presence becomes more powerful, more timeless, and more direct.'
                    },
                    {
                        id: 'long-exposure',
                        label: 'Long Exposure',
                        content: 'Long exposure gathers more than just light — it gathers time. Subtle details that escape the eye become visible when the sensor remains open longer. Motion smooths into flow, stillness deepens, and scenes gain a sense of continuity that a split-second capture can never hold.'
                    },
                    {
                        id: 'vibration-reduction',
                        label: 'Vibration Reduction',
                        content: 'Image stabilization is often described as reducing shake, but it is closer to intelligent tracking. As the camera moves, the system shifts elements or the sensor itself to keep the subject aligned. This correction preserves clarity, but it also means part of the sensor’s area is used for compensation rather than pure capture — a trade between stability and maximum resolution.'
                    },
                    {
                        id: 'lens-craftsmanship',
                        label: 'Why Lenses Cost So Much',
                        content: 'The price of a lens is not for zoom alone, but for the precision of glass. Each element is shaped to guide light with minimal distortion, preserving detail, contrast, and color before it ever reaches the sensor. A good camera records what it receives; a great lens determines what arrives in the first place.'
                    }
                ]
            }
        };

        // DOM Elements
        const viewMap = document.getElementById('view-map');
        const viewLandscape = document.getElementById('view-landscape');
        const viewContent = document.getElementById('view-content');
        const viewGallery = document.getElementById('view-gallery');
        const backBtn = document.getElementById('back-btn');

        // Transitions
        function transitionTo(nextView, direction) {
            const currentView = getViewElement(currentLevel);

            if (direction === 'forward') {
                nextView.classList.remove('prev');
                nextView.classList.add('next');
                void nextView.offsetWidth; // Force reflow
                currentView.classList.remove('active');
                currentView.classList.add('prev');
                nextView.classList.remove('next');
                nextView.classList.add('active');
            } else {
                nextView.classList.remove('next');
                nextView.classList.add('prev');
                void nextView.offsetWidth; // Force reflow
                currentView.classList.remove('active');
                currentView.classList.add('next');
                nextView.classList.remove('prev');
                nextView.classList.add('active');
            }
        }

        function getViewElement(level) {
            if (level === 0) return viewMap;
            if (level === 1) return viewLandscape;
            if (level === 2) return viewContent;
            if (level === 3) return viewGallery;
        }

        function updateUI() {
            backBtn.style.display = currentLevel > 0 ? 'block' : 'none';
        }

        // Navigation Actions
        function goToLandscape(key) {
            currentTopicKey = key;
            const data = DATA[key];
            if (!data) return;

            document.getElementById('landscape-title').innerText = data.title;
            const container = document.getElementById('landscape-canvas');
            const viewSection = document.getElementById('view-landscape');

            // Set Background Image with stylistic filter
            if (data.bgImage) {
                viewSection.style.backgroundImage = `url('${data.bgImage}')`;
                viewSection.style.backgroundSize = 'cover';
                viewSection.style.backgroundPosition = 'center';
                viewSection.style.backgroundBlendMode = 'multiply';
            } else {
                viewSection.style.backgroundImage = 'none';
            }

            container.innerHTML = ''; // Clear

            // Render Topics
            data.topics.forEach(topic => {
                const el = document.createElement('div');
                el.className = 'topic-marker';
                el.innerText = topic.label;
                el.onclick = () => goToContent(topic.label, topic.content);
                container.appendChild(el);
            });

            // Add "My Clicks" Button if Photography
            if (key === 'photography') {
                const galleryBtn = document.createElement('div');
                galleryBtn.className = 'topic-marker';
                galleryBtn.innerText = 'My Clicks';
                galleryBtn.onclick = () => openGallery();
                container.appendChild(galleryBtn);
            }

            transitionTo(viewLandscape, 'forward');
            currentLevel = 1;
            updateUI();
        }

        function openGallery() {
            const container = document.getElementById('gallery-grid');
            container.innerHTML = '';

            // Loop for processed photos (1 to 44 based on script output)
            for (let i = 1; i <= 44; i++) {
                const img = document.createElement('img');
                img.src = `images/gallery/photo_${i}.jpg`;
                img.style.width = '100%';
                img.style.borderRadius = '4px';
                img.style.boxShadow = '0 4px 6px rgba(0,0,0,0.1)';
                img.loading = 'lazy';
                container.appendChild(img);
            }

            transitionTo(viewGallery, 'forward');
            currentLevel = 3;
            updateUI();
        }

        function goToContent(title, text) {
            document.getElementById('content-title').innerText = title;
            document.getElementById('content-body').innerText = text;

            // Clear Background for Content View (User Request)
            const viewContent = document.getElementById('view-content');
            viewContent.style.backgroundImage = 'none';

            transitionTo(viewContent, 'forward');
            currentLevel = 2;
            updateUI();
        }

        function goBack() {
            if (currentLevel === 0) return;

            const prevLevel = (currentLevel === 3) ? 1 : currentLevel - 1; // Gallery goes back to Landscape
            transitionTo(getViewElement(prevLevel), 'back');
            currentLevel = prevLevel;
            updateUI();
        }

        // Random Map Generator
        function randomizeMapPositions() {
            const btns = document.querySelectorAll('.map-btn');
            const container = document.querySelector('.map-container');
            const occupied = [];

            btns.forEach(btn => {
                let overlap = true;
                let attempts = 0;
                let top, left;

                while (overlap && attempts < 100) {
                    // Generate random pos between 10% and 80% to avoid edges
                    top = 10 + Math.random() * 70;
                    left = 10 + Math.random() * 70;

                    overlap = false;
                    // Simple collision check (approximate distance > 15%)
                    for (let pos of occupied) {
                        const dist = Math.sqrt(Math.pow(pos.t - top, 2) + Math.pow(pos.l - left, 2));
                        if (dist < 20) { // 20% minimum distance
                            overlap = true;
                            break;
                        }
                    }
                    attempts++;
                }

                if (attempts >= 100) console.warn("Could not place button without overlap");

                occupied.push({ t: top, l: left });

                // Apply styles
                btn.style.top = top + '%';
                btn.style.left = left + '%';
                const rotation = -10 + Math.random() * 20; // -10 to 10 deg
                btn.style.transform = `rotate(${rotation}deg)`;
            });
        }

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            randomizeMapPositions();
        });
    </script>
</body>

</html>
