<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Workshop | Kiran K. Kethineni</title>
    <link rel="stylesheet" href="css/style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Roboto:wght@300;400;500&display=swap"
        rel="stylesheet">

<body>
    <!-- HEADER injected by main.js -->
    <header></header>

    <!-- NAVIGATION injected by main.js -->
    <nav class="main-nav"></nav>

    <main class="container">
        <section class="mt-4 mb-4" style="text-align: center;">
            <h1>The Workshop</h1>
            <p>Practical builds, hardware hacks, and personal engineering projects.</p>
        </section>

        <!-- HEXAGONAL CLUSTER -->
        <div class="hex-cluster">
            <!-- Project 1: KVM -->
            <div class="hex-tile" onclick="openModal('kvm')">
                <h3>Portable KVM</h3>
                <p>Server Maintenance</p>
            </div>

            <!-- Project 2: DVR -->
            <div class="hex-tile" onclick="openModal('dvr')">
                <h3>Custom DVR</h3>
                <p>Media Archival</p>
            </div>

            <!-- Decorative / Coming Soon Tiles -->
            <div class="hex-tile" style="background-color: var(--gray-100); cursor: default;">
                <h3 style="color: var(--gray-300);">Future Build</h3>
            </div>
            <div class="hex-tile" style="background-color: var(--gray-100); cursor: default;">
                <h3 style="color: var(--gray-300);">In Progress</h3>
            </div>
            <div class="hex-tile" style="background-color: var(--gray-100); cursor: default;">
                <h3 style="color: var(--gray-300);">Idea Lab</h3>
            </div>
        </div>

        <!-- MODAL POPUP -->
        <div id="project-modal" class="modal-overlay">
            <div class="modal-content">
                <button class="modal-close-btn" onclick="closeModal()">&times;</button>
                <div id="modal-body-content">
                    <!-- Dynamic Content -->
                </div>
            </div>
        </div>

    </main>

    <!-- FOOTER injected by main.js -->
    <footer></footer>

    <script src="js/main.js"></script>

            },
            "dvr": {
                title: "Custom DVR for Streaming",
                content: `
                    <p><strong>Goal:</strong> Building a personal DVR to capture and archive streaming content.</p>
                    <p>Designed and consolidated a custom Digital Video Recorder (DVR) system capable of capturing specific streaming feeds for archival purposes. The system automates recording schedules and manages storage efficiency, providing a private library of content independent of platform availability.</p>
                    <div style="margin-top: 1rem; background: var(--gray-100); padding: 1rem; border-radius: 4px; border: 1px dashed var(--gray-300); text-align: center; color: var(--gray-500);">
                        [Image Placeholder: DVR System Architecture]
                    </div>
                `
            }
        };

        const modal = document.getElementById('project-modal');
        const modalContent = document.getElementById('modal-body-content');

        function openModal(projectId) {
            const project = WORKSHOP_DATA[projectId];
            if (project) {
                modalContent.innerHTML = `
                    <h2 style="margin-top: 0;">${project.title}</h2>
                    ${project.content}
                `;
                modal.classList.add('active');
                document.body.style.overflow = 'hidden'; // Prevent background scrolling
            }
        }

        function closeModal() {
            modal.classList.remove('active');
            document.body.style.overflow = ''; // Restore scrolling
        }

        // Close modal when clicking outside content
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                closeModal();
            }
        });

        // Close on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modal.classList.contains('active')) {
                closeModal();
            }
        });
    </script>
</body>

</html>
