<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e7ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f3f4f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="90" fill="url(#grad1)" />
  <g stroke="#9ca3af" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Central Node -->
    <circle cx="100" cy="100" r="10" fill="#fff" />
    
    <!-- Connected Nodes -->
    <circle cx="60" cy="70" r="6" fill="#fff" />
    <circle cx="140" cy="70" r="6" fill="#fff" />
    <circle cx="60" cy="130" r="6" fill="#fff" />
    <circle cx="140" cy="130" r="6" fill="#fff" />
    <circle cx="100" cy="50" r="4" fill="#fff" />
    <circle cx="100" cy="150" r="4" fill="#fff" />

    <!-- Connections -->
    <path d="M100 100 L60 70" />
    <path d="M100 100 L140 70" />
    <path d="M100 100 L60 130" />
    <path d="M100 100 L140 130" />
    <path d="M60 70 L100 50 L140 70" />
    <path d="M60 130 L100 150 L140 130" />
  </g>
</svg>
